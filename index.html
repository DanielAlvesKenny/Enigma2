<script>
const condutor1=22;
const condutor2=60;
const condutor3=56;
let current="";
let etapa=1;
let erros=0;
const panel=document.getElementById("panel");

const keys=[
["1",68,16.5],["2",76.6,16.5],["3",85.4,16.5],
["4",68,29],["5",76.6,29],["6",85.4,29],
["7",68,41.5],["8",76.6,41.5],["9",85.4,41.5],
["C",68,53],["0",76.6,53],["OK",85.4,53],
["R",46.5,2], ["⛶",77,5.5]
];

keys.forEach(k=>{
let b=document.createElement("button");
b.className="key";

if(k[0]==="⛶"){
b.id="btnFullscreen";
}
b.style.left=k[1]+"%";
b.style.top=k[2]+"%";
b.style.width="7%";
b.style.height="9%";
b.onclick=()=>press(k[0]);
panel.appendChild(b);
});


function update(){

let g1="--";
let g2="--";
let g3="--";

if(etapa===1){

g1=current.padEnd(2,"0");

}

else if(etapa===2){

g1="22";
g2=current.padEnd(2,"0");

}

else{

g1="22";
g2="60";
g3=current.padEnd(2,"0");

}

document.getElementById("display").innerHTML=
`
<span class="digit">${g1}</span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="digit">${g2}</span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="sep"></span>
<span class="digit">${g3}</span>
`;
}


function tocarSom(id){

const s=document.getElementById(id);

if(!s)return;

s.pause();
s.currentTime=0;
s.play();

}


function typeWriter(id,txt,color,speed=35,callback=null){

const el=document.getElementById(id);

el.innerHTML="";
el.style.color=color;

let i=0;

function escrever(){

if(i<txt.length){

if(txt.substring(i,i+4)==="<br>"){
el.innerHTML+="<br>";
i+=4;
}
else{
el.innerHTML+=txt[i];
i++;
}

setTimeout(escrever,speed);

}else{

if(callback){
callback();
}

}

}

escrever();
}




function setStatus(txt,color){
typeWriter("status",txt,color,80);
}


function updateBombs(){

const b=document.getElementById("bombs");

let dots="";

for(let i=0;i<3;i++){

if(i<erros){
dots+="◉ ";
}
else{
dots+="○ ";
}

}

/* ALERTA */

let alerta="";

if(erros===2){

alerta=
`
<div id="dangerAlert">
⚠ ALERTA MÁXIMO ⚠
</div>
`;

}

b.innerHTML=
`
<div id="bombTitle">
RISCO ESTRUTURAL
</div>

<div id="bombDots">
${dots}
</div>

${alerta}
`;
}

function gameOver(){

tocarSom("sndFail");

setStatusVault(

"☢ COLAPSO DO SISTEMA ☢",
"#ff3333",

"💥 INTEGRIDADE DO COFRE PERDIDA 💥<br>PROTOCOLO ΣNIGMA ENCERRADO",
"#ff3333",

null,

false

);

}


function resetSistema(){

etapa=1;
current="";

document.getElementById("bg").src=
"img/base.png";

const fsBtn=
document.getElementById("btnFullscreen");

if(fsBtn){
fsBtn.style.display="flex";
}

document.getElementById("panel").style.filter=
"none";

gammaLock.style.transform=
"scale(1)";

update();

document.getElementById("status").innerHTML=
"Aguardando código...";

document.getElementById("vault").innerHTML="PROTOCOLO AGUARDANDO";

alphaLock.innerHTML="🔒 ALPHA";
betaLock.innerHTML="🔒 BETA";
gammaLock.innerHTML="🔒 GAMMA";

alphaLock.classList.remove("open");
betaLock.classList.remove("open");
gammaLock.classList.remove("open");

erros=0;
updateBombs();

/* RESET TIMER */

clearInterval(intervaloCofre);

tempoCofre = 15 * 60;
cofreTravado = false;
intervaloCofre = null;

document.getElementById("tempoValor").innerText =
"15:00";

document.getElementById("timerCofre").innerHTML = `
<span id="timerLabel">
BLOQUEIO TOTAL EM:
</span>

<span id="tempoValor">
15:00
</span>
`;

iniciarTimerCofre();

setStatus(
"Aguardando código...",
"#42e6ff"
);

}






function setStatusVault(
statusTxt,
statusColor,
vaultTxt,
vaultColor,
callback=null,
reiniciar=true
){

typeWriter(

"status",
"ANALISANDO ESTRUTURA...",
"#42e6ff",
80,

()=>{

setTimeout(()=>{

typeWriter(

"status",
statusTxt,
statusColor,
32,

()=>{

typeWriter(

"vault",
vaultTxt,
vaultColor,
28,

()=>{

if(callback){
callback();
}

/* FINAL PERMANENTE */
if(!reiniciar){
return;
}

setTimeout(()=>{

    apagarTexto("status",8,()=>{

        apagarTexto("vault",8,()=>{

            current="";
            update();

            setTimeout(()=>{

                setStatus(
                "Aguardando código...",
                "#42e6ff"
                );

            },100);

        });

    });

},4000);

}

);

}

);

},500);

}

);

}



function apagarTexto(id,speed=600,callback=null){

const el=document.getElementById(id);

let txt=el.innerHTML;

function apagar(){

if(txt.length>0){

if(txt.endsWith("<br>")){
txt=txt.slice(0,-4);
}
else{
txt=txt.slice(0,-1);
}

el.innerHTML=txt;

setTimeout(apagar,speed);

}else{

if(callback){
callback();
}

}

}

apagar();
}




function press(v){
    if(v==="⛶"){

telaCheia();
return;

}
    if(v==="R"){

resetSistema();
return;

}
if(v==="C"){
current="";
update();
setStatus("Aguardando código...","#42e6ff");
return;
}

if(v==="OK"){
testar();
return;
}

if(current.length<2){

    tocarSom("sndKey");

/* PRIMEIRO DÍGITO */
if(current.length===0){
setStatus("Digitando código...","#ffd166");
}

current+=v;
update();

}
}

function pertence(n,a,b,c){

for(let i=0;i<=n/a;i++){
for(let j=0;j<=n/b;j++){
for(let k=0;k<=n/c;k++){

if(a*i+b*j+c*k===n){
return true;
}

}}}

return false;
}

function testar(){

    if(cofreTravado){

tocarSom("sndFail");

setStatus(
"☢ SISTEMA BLOQUEADO ☢",
"#ff3333"
);

return;
}

let n=parseInt(current);

if(isNaN(n)){
setStatus("Digite código","#42e6ff");
return;
}

if(etapa===1){

if(n===22){


setStatusVault(
"ESTRUTURA RECONHECIDA<br><br>CÓDIGO CORRETO",
"#72ff7a",
"🔓 COFRE ALPHA DESBLOQUEADO 🔓",
"#ffb347",

()=>{

    abrirAlpha();
    tocarSom("sndOpen");
const a=document.getElementById("alphaLock");

a.innerHTML="ALPHA 🔓";
a.classList.add("open");

    etapa=2;

}

);

return;

}

else{

    if(pertence(n,4,10,15)){

        setStatusVault(
"BLOCO DE DADOS DETECTADO<br><br>LIBERAÇÃO NEGADA",
"#72ff7a",
"🔒 COFRE ALPHA PERMANECE SELADO 🔒",
"#ffb347"
);

    }else{

            erros++;
updateBombs();
tocarSom("sndError");

if(erros>=3){
gameOver();
return;
}

setStatusVault(
"FALHA ESTRUTURAL<br><br>CÓDIGO NÃO REPRESENTÁVEL",
"#ff5555",
"💣 INTEGRIDADE COMPROMETIDA",
"#ff5555"
);

    }
}

}

else if(etapa===2){

if(n===60){


setStatusVault(
"ESTRUTURA RECONHECIDA<br><br>CÓDIGO CORRETO",
"#72ff7a",
"🔓 COFRE BETA DESBLOQUEADO 🔓",
"#ffb347",

      ()=>{

        abrirBeta();
        tocarSom("sndOpen");


    const b=document.getElementById("betaLock");
    b.innerHTML="BETA 🔓";
    b.classList.add("open");


        etapa=3;

    }

    );

    return;
}

else{

    if(pertence(n,5,23,32)){

        setStatusVault(
"BLOCO DE DADOS DETECTADO<br><br>LIBERAÇÃO NEGADA",
"#72ff7a",
"🔒 COFRE BETA PERMANECE SELADO 🔒",
"#ffb347"
);

    }else{

        erros++;
updateBombs();

if(erros>=3){
gameOver();
return;
}

setStatusVault(
"FALHA ESTRUTURAL<br><br>CÓDIGO NÃO REPRESENTÁVEL",
"#ff5555",
"💣 INTEGRIDADE COMPROMETIDA",
"#ff5555"
);

    }
}
}

else{

if(n===56){


setStatusVault(
"ANÁLISE FINAL",
"#72ff7a",
"🔓 COFRE GAMMA DESBLOQUEADO 🔓 <br> ✨ PARABÉNS✨ <br> VOCÊ DESVENDOU O <br> ΣNIGMA",
    "#72ff7a",
 ()=>{

        abrirGamma();
            tocarSom("sndFinal");

        const g=document.getElementById("gammaLock");
    g.innerHTML="GAMMA 🔓";
    g.classList.add("open");

        efeitoFinal();


    },

    false

    );

    return;

else{

    if (intervaloCofre) return;

    intervaloCofre = setInterval(() => {

        tempoCofre--;

        const min = Math.floor(tempoCofre / 60);
        const seg = tempoCofre % 60;

        document.getElementById("tempoValor").innerText =
            String(min).padStart(2,"0") + ":" +
            String(seg).padStart(2,"0");

        if (tempoCofre <= 0) {

     clearInterval(intervaloCofre);
    intervaloCofre = null;
    cofreTravado = true;

    document.getElementById("timerCofre").innerText =
        "⏳ TEMPO ESGOTADO";

    tocarSom("sndFail");

        false
    );
}

    },1000);
}
